    iw.addEventListener("touchstart",function(e){touchX=e.touches[0].clientX;},{passive:true});
    iw.addEventListener("touchend",function(e){var dx=e.changedTouches[0].clientX-touchX;if(Math.abs(dx)>40){cardImgIdx=(cardImgIdx+(dx<0?1:-1)+imgs.length)%imgs.length;if(cardImg){cardImg.src=imgs[cardImgIdx];}if(dotWrap){updateDots(dotWrap,imgs.length,cardImgIdx);}}},{passive:true});
    iw.appendChild(al);iw.appendChild(ar);
  }
  (function(prodImgs){iw.addEventListener("click",function(e){if(e.target===hb||hb.contains(e.target)){return;}track("lightbox_open",{item_name:p.name,item_brand:p.brand});openLb(prodImgs,cardImgIdx);});})(imgs);
  card.appendChild(iw);
  if(imgs.length>1){dotWrap=document.createElement("div");dotWrap.className="card-dots";updateDots(dotWrap,imgs.length,0);card.appendChild(dotWrap);}
  var body=document.createElement("div");body.className="card-body";
  var br=document.createElement("div");br.className="card-brand";var bd=document.createElement("span");bd.className="brand-dot";bd.style.background=p.color;br.appendChild(bd);br.appendChild(document.createTextNode(p.brand));body.appendChild(br);
  var pn=document.createElement("div");pn.className="card-name";pn.textContent=p.name;body.appendChild(pn);
  var tags=document.createElement("div");tags.className="card-tags";var t1=document.createElement("span");t1.className="tag tag-sec";t1.textContent=p.gender;var t2=document.createElement("span");t2.className="tag tag-sec";t2.textContent=p.cat;tags.appendChild(t1);tags.appendChild(t2);body.appendChild(tags);
  if(p.sizes.length){var ms=document.createElement("div");ms.className="card-meta";ms.textContent=p.sizes.slice(0,5).join(", ")+(p.sizes.length>5?" +":"");body.appendChild(ms);}
  var foot=document.createElement("div");foot.className="card-footer";
  var pr=document.createElement("span");if(p.price){pr.className="card-price";pr.textContent="$"+p.price.toFixed(2);}else{pr.className="card-price-na";pr.textContent="See site";}
  var buy=document.createElement("a");buy.href=p.url;buy.target="_blank";buy.className="btn-buy";buy.innerHTML='<svg style="width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>Buy';
  buy.addEventListener("click",function(e){e.stopPropagation();track("buy_click",{item_name:p.name,item_brand:p.brand,price:p.price,currency:"AUD"});});
  foot.appendChild(pr);foot.appendChild(buy);body.appendChild(foot);
  card.appendChild(body);return card;
}

function makeSkeleton(){
  var card=document.createElement("div");card.className="skeleton-card";
  var img=document.createElement("div");img.className="skeleton-img";card.appendChild(img);
  var body=document.createElement("div");body.className="skeleton-body";
  var l1=document.createElement("div");l1.className="skeleton-line short";body.appendChild(l1);
  var l2=document.createElement("div");l2.className="skeleton-line full";body.appendChild(l2);
  var l3=document.createElement("div");l3.className="skeleton-line med";body.appendChild(l3);
  var l4=document.createElement("div");l4.className="skeleton-line short";body.appendChild(l4);
  var foot=document.createElement("div");foot.className="skeleton-footer";
  var pr=document.createElement("div");pr.className="skeleton-price";
  var btn=document.createElement("div");btn.className="skeleton-btn";
  foot.appendChild(pr);foot.appendChild(btn);body.appendChild(foot);card.appendChild(body);return card;
}
function showSkeleton(){
  var m=document.getElementById("main");if(!m){return;}
  var wrap=document.createElement("div");wrap.className="skeleton-grid";
  var grid=document.createElement("div");grid.className="grid";
  for(var i=0;i<12;i++){grid.appendChild(makeSkeleton());}
  wrap.appendChild(grid);m.innerHTML="";m.appendChild(wrap);
}

function renderGrid(){
  var main=document.getElementById("main");if(!main){return;}
  renderFilters();
  var filtered=getFiltered();
  var cl=document.getElementById("countLabel");if(cl){cl.textContent=filtered.length+" of "+allProducts.length+" shirts";}
  main.innerHTML="";
  if(!filtered.length){main.innerHTML='<div class="empty"><div style="font-size:16px;font-weight:600;color:#374151">No shirts match your filters</div></div>';return;}
  var wrap=document.createElement("div");wrap.className="grid-wrap";
  var lbl=document.createElement("div");lbl.className="section-label";lbl.textContent=filtered.length+" shirts found";wrap.appendChild(lbl);
  var grid=document.createElement("div");grid.className="grid";
  for(var i=0;i<filtered.length;i++){grid.appendChild(makeCard(filtered[i]));}
  wrap.appendChild(grid);main.appendChild(wrap);
}
function renderAll(){renderFilters();renderGrid();}

function openShortlist(){
  var grid=document.getElementById("slGrid");if(!grid){return;}grid.innerHTML="";
  if(!shortlist.length){var em=document.createElement("div");em.className="sl-empty";em.textContent="No shirts shortlisted yet. Tap the heart on any shirt to save it here.";grid.appendChild(em);}
  else{for(var i=0;i<shortlist.length;i++){(function(p){var card=document.createElement("div");card.className="sl-card";if(p.img){var img=document.createElement("img");img.src=p.img;img.alt=p.name;img.onerror=function(){this.style.display="none";};card.appendChild(img);}else{var ph=document.createElement("div");ph.className="sl-card-ph";ph.style.background=p.color+"20";ph.textContent="Shirt";card.appendChild(ph);}var body=document.createElement("div");body.className="sl-card-body";var br2=document.createElement("div");br2.className="sl-brand";br2.textContent=p.brand;var nm=document.createElement("div");nm.className="sl-name";nm.textContent=p.name;var pr2=document.createElement("div");pr2.className="sl-price";pr2.textContent=p.price?"$"+p.price.toFixed(2):"See site";var buy2=document.createElement("a");buy2.href=p.url;buy2.target="_blank";buy2.className="sl-buy";buy2.textContent="Buy from "+p.brand;var rem=document.createElement("button");rem.className="sl-remove";rem.textContent="Remove";rem.addEventListener("click",function(){var next=[];for(var j=0;j<shortlist.length;j++){if(shortlist[j].id!==p.id){next.push(shortlist[j]);}}shortlist=next;var fab=document.getElementById("shortlistFab");var cnt=document.getElementById("slCount");if(fab){fab.style.display=shortlist.length?"block":"none";}if(cnt){cnt.textContent=shortlist.length;}openShortlist();renderAll();});body.appendChild(br2);body.appendChild(nm);body.appendChild(pr2);body.appendChild(buy2);body.appendChild(rem);card.appendChild(body);grid.appendChild(card);})(shortlist[i]);}}
  var ov=document.getElementById("slOverlay");if(ov){ov.classList.add("open");document.body.style.overflow="hidden";}
}
function closeShortlist(){var ov=document.getElementById("slOverlay");if(ov){ov.classList.remove("open");document.body.style.overflow="";}}

function loadSource(src){
  fetch(PROXY+"?site="+src.param)
    .then(function(res){if(!res.ok){throw new Error("HTTP "+res.status);}return res.json();})
    .then(function(data){
      var prods=parseProds(data,src);
      var next=allProducts.filter(function(p){return p.brand!==src.brand;});
      for(var i=0;i<prods.length;i++){next.push(prods[i]);}
      allProducts=next;
      var f=document.getElementById("filters");if(f){f.style.display="flex";}
      renderAll();
    })
    .catch(function(e){console.error(src.brand,e.message);});
}
function loadAll(){
  allProducts=[];
  var f=document.getElementById("filters");if(f){f.style.display="none";}
  showSkeleton();
  for(var i=0;i<SOURCES.length;i++){loadSource(SOURCES[i]);}
}

document.addEventListener("DOMContentLoaded",function(){
  document.getElementById("search").addEventListener("input",renderAll);
  document.getElementById("sortSel").addEventListener("change",renderAll);
  document.getElementById("upfChip").addEventListener("click",function(){fUpf=!fUpf;renderAll();});
  document.getElementById("filterToggleBtn").addEventListener("click",function(){var f=document.getElementById("filters");f.classList.toggle("mobile-open");this.classList.toggle("active");});
  document.getElementById("shortlistFab").addEventListener("click",openShortlist);
  document.getElementById("slCloseBtn").addEventListener("click",closeShortlist);
  document.getElementById("slOverlay").addEventListener("click",function(e){if(e.target===this){closeShortlist();}});
  document.getElementById("lbClose").addEventListener("click",closeLb);
  document.getElementById("lbNavL").addEventListener("click",function(e){e.stopPropagation();lbGo(-1);});
  document.getElementById("lbNavR").addEventListener("click",function(e){e.stopPropagation();lbGo(1);});
  document.getElementById("lbImgWrap").addEventListener("click",function(){lbZoomed=!lbZoomed;this.classList.toggle("zoomed",lbZoomed);});
  document.getElementById("lbOverlay").addEventListener("click",function(e){if(e.target===this){closeLb();}});
  var lbTouchX=0;
  document.getElementById("lbOverlay").addEventListener("touchstart",function(e){lbTouchX=e.touches[0].clientX;},{passive:true});
  document.getElementById("lbOverlay").addEventListener("touchend",function(e){var dx=e.changedTouches[0].clientX-lbTouchX;if(Math.abs(dx)>40){lbGo(dx<0?1:-1);}},{passive:true});
  document.addEventListener("keydown",function(e){var lb=document.getElementById("lbOverlay");if(lb&&lb.classList.contains("open")){if(e.key==="Escape"){closeLb();}if(e.key==="ArrowRight"){lbGo(1);}if(e.key==="ArrowLeft"){lbGo(-1);}}var sl=document.getElementById("slOverlay");if(sl&&sl.classList.contains("open")&&e.key==="Escape"){closeShortlist();}});
  loadAll();
});
</script>
</body>
